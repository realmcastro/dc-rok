services:
  postgres:
    image: postgres:16-alpine
    container_name: dcrok-postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: dcrok
      POSTGRES_USER: dcrok_owner
      POSTGRES_PASSWORD: dcrok_owner_password
    ports:
      - '5432:5432'
    volumes:
      - dcrok_pgdata:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U dcrok_owner -d dcrok']
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  dcrok_pgdata:
